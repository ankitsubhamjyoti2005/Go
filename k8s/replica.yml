apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  labels:
     app: nginx
     env: demo
spec:
  replicas: 3
  selector:
    matchLabels:
      env: demo
  template:
    metadata:
      labels:
        env: demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.15.7
